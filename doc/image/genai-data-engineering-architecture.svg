<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 1020" font-family="Segoe UI, system-ui, sans-serif">
  <defs>
    <style>
      .title { font-size: 24px; font-weight: 600; fill: #1f2328; }
      .subtitle { font-size: 14px; fill: #656d76; }
      .label { font-size: 16px; font-weight: 600; fill: #1f2328; }
      .layer-title { font-size: 17px; font-weight: 600; fill: #1f2328; }
      .body { font-size: 13px; fill: #656d76; }
      .box-title { font-size: 13px; font-weight: 600; fill: #1f2328; }
      .box-item { font-size: 12px; fill: #656d76; }
      .chip { font-size: 13px; fill: #424a53; }
      .accent { fill: #0969da; }
      .accent-stroke { stroke: #0969da; }
      .muted-stroke { stroke: #d0d7de; }
      .layer-header { fill: #eaeef2; }
    </style>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#656d76"/>
    </marker>
    <marker id="arrow-accent" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#0969da"/>
    </marker>
  </defs>

  <rect width="820" height="1020" fill="#ffffff"/>

  <!-- Title -->
  <text x="410" y="40" text-anchor="middle" class="title">Gen AI and Data Engineering</text>
  <text x="410" y="62" text-anchor="middle" class="subtitle">Declarative intent → generated code → standard tools</text>

  <!-- Data Engineer -->
  <g transform="translate(374, 78)">
    <circle cx="36" cy="36" r="34" class="accent-stroke" stroke-width="2" fill="#f6f8fa"/>
    <circle cx="36" cy="26" r="10" class="accent-stroke" stroke-width="2" fill="none"/>
    <path d="M18 58c0-10 8-16 18-16s18 6 18 16" class="accent-stroke" stroke-width="2" fill="none" stroke-linecap="round"/>
    <rect x="28" y="40" width="16" height="12" rx="2" class="accent-stroke" stroke-width="1.5" fill="none"/>
    <path d="M32 46h8M36 42v8" class="accent-stroke" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <text x="410" y="168" text-anchor="middle" class="label">Data Engineer</text>
  <text x="410" y="186" text-anchor="middle" class="body">Defines intent, reviews output, owns the solution</text>

  <line x1="410" y1="198" x2="410" y2="222" stroke="#656d76" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Layer 1 -->
  <g transform="translate(50, 232)">
    <rect width="720" height="248" rx="10" class="accent-stroke" stroke-width="2" fill="#f6f8fa"/>
    <rect width="720" height="44" rx="10" class="layer-header"/>
    <rect y="34" width="720" height="10" class="layer-header"/>
    <rect x="16" y="10" width="28" height="28" rx="6" fill="#0969da"/>
    <text x="30" y="29" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="600">1</text>
    <text x="56" y="29" class="layer-title">Specification of intent</text>

    <text x="20" y="68" class="body">Technology-agnostic description of what — not how.</text>

    <!-- Generic patterns -->
    <rect x="20" y="82" width="220" height="108" rx="8" class="accent-stroke" stroke-width="1.5" fill="#ddf4ff"/>
    <text x="32" y="102" class="box-title accent">Design patterns — Generic</text>
    <text x="32" y="122" class="box-item">Separate what and how</text>
    <text x="32" y="140" class="box-item">Functional decomposition</text>
    <text x="32" y="158" class="box-item">Simplicity</text>

    <!-- Data engineering patterns -->
    <rect x="250" y="82" width="220" height="108" rx="8" class="muted-stroke" stroke-width="1" fill="#ffffff"/>
    <text x="262" y="102" class="box-title">Design patterns — Data engineering</text>
    <text x="262" y="122" class="box-item">Data extractor</text>
    <text x="262" y="140" class="box-item">Data object &amp; poller</text>
    <text x="262" y="158" class="box-item">Event-based orchestration</text>

    <!-- Documentation -->
    <rect x="480" y="82" width="220" height="108" rx="8" class="muted-stroke" stroke-width="1" fill="#ffffff"/>
    <text x="492" y="102" class="box-title">Documentation &amp; standards</text>
    <text x="492" y="122" class="box-item">Architecture decisions</text>
    <text x="492" y="140" class="box-item">DSA metadata</text>
    <text x="492" y="158" class="box-item">Runbooks</text>

    <rect x="20" y="206" width="72" height="26" rx="13" fill="#0969da"/>
    <text x="56" y="223" text-anchor="middle" fill="#ffffff" font-size="12">Declarative</text>
    <rect x="100" y="206" width="130" height="26" rx="13" class="muted-stroke" stroke-width="1" fill="#ffffff"/>
    <text x="165" y="223" text-anchor="middle" class="chip">Technology-agnostic</text>
  </g>

  <!-- Gen AI bridge -->
  <line x1="410" y1="490" x2="410" y2="514" class="accent-stroke" stroke-width="2" marker-end="url(#arrow-accent)"/>
  <rect x="255" y="524" width="310" height="48" rx="8" class="accent-stroke" stroke-width="1.5" fill="#f6f8fa"/>
  <text x="410" y="546" text-anchor="middle" class="label accent">Generative AI</text>
  <text x="410" y="562" text-anchor="middle" class="body">Translates declarative intent into implementation</text>
  <line x1="410" y1="582" x2="410" y2="606" class="accent-stroke" stroke-width="2" marker-end="url(#arrow-accent)"/>

  <!-- Layer 2 -->
  <g transform="translate(50, 616)">
    <rect width="720" height="168" rx="10" class="muted-stroke" stroke-width="1" fill="#f6f8fa"/>
    <rect width="720" height="44" rx="10" class="layer-header"/>
    <rect y="34" width="720" height="10" class="layer-header"/>
    <rect x="16" y="10" width="28" height="28" rx="6" fill="#eaeef2"/>
    <text x="30" y="29" text-anchor="middle" class="label" font-size="14">2</text>
    <text x="56" y="29" class="layer-title">Code and configuration</text>

    <text x="20" y="68" class="body">Generated and reviewed implementation on a concrete stack.</text>

    <rect x="20" y="82" width="108" height="30" rx="6" class="muted-stroke" stroke-width="1" fill="#ffffff"/>
    <text x="74" y="101" text-anchor="middle" class="chip">Python modules</text>
    <rect x="136" y="82" width="100" height="30" rx="6" class="muted-stroke" stroke-width="1" fill="#ffffff"/>
    <text x="186" y="101" text-anchor="middle" class="chip">SQL &amp; migrations</text>
    <rect x="244" y="82" width="96" height="30" rx="6" class="muted-stroke" stroke-width="1" fill="#ffffff"/>
    <text x="292" y="101" text-anchor="middle" class="chip">Airflow DAGs</text>
    <rect x="348" y="82" width="108" height="30" rx="6" class="muted-stroke" stroke-width="1" fill="#ffffff"/>
    <text x="402" y="101" text-anchor="middle" class="chip">Docker &amp; compose</text>
    <rect x="464" y="82" width="108" height="30" rx="6" class="muted-stroke" stroke-width="1" fill="#ffffff"/>
    <text x="518" y="101" text-anchor="middle" class="chip">CI/CD workflows</text>
    <rect x="580" y="82" width="88" height="30" rx="6" class="muted-stroke" stroke-width="1" fill="#ffffff"/>
    <text x="624" y="101" text-anchor="middle" class="chip">Tests &amp; hooks</text>
  </g>

  <line x1="410" y1="794" x2="410" y2="818" stroke="#656d76" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Layer 3 -->
  <g transform="translate(50, 828)">
    <rect width="720" height="148" rx="10" class="muted-stroke" stroke-width="1" fill="#f6f8fa"/>
    <rect width="720" height="44" rx="10" class="layer-header"/>
    <rect y="34" width="720" height="10" class="layer-header"/>
    <rect x="16" y="10" width="28" height="28" rx="6" fill="#eaeef2"/>
    <text x="30" y="29" text-anchor="middle" class="label" font-size="14">3</text>
    <text x="56" y="29" class="layer-title">Standard tools</text>

    <text x="20" y="68" class="body">Off-the-shelf platforms that run the solution in production.</text>

    <rect x="20" y="82" width="108" height="30" rx="6" class="muted-stroke" stroke-width="1" fill="#ffffff"/>
    <text x="74" y="101" text-anchor="middle" class="chip">Apache Airflow</text>
    <rect x="136" y="82" width="88" height="30" rx="6" class="muted-stroke" stroke-width="1" fill="#ffffff"/>
    <text x="180" y="101" text-anchor="middle" class="chip">PostgreSQL</text>
    <rect x="232" y="82" width="64" height="30" rx="6" class="muted-stroke" stroke-width="1" fill="#ffffff"/>
    <text x="264" y="101" text-anchor="middle" class="chip">Docker</text>
    <rect x="304" y="82" width="108" height="30" rx="6" class="muted-stroke" stroke-width="1" fill="#ffffff"/>
    <text x="358" y="101" text-anchor="middle" class="chip">GitHub Actions</text>
    <rect x="420" y="82" width="58" height="30" rx="6" class="muted-stroke" stroke-width="1" fill="#ffffff"/>
    <text x="449" y="101" text-anchor="middle" class="chip">NGINX</text>
    <rect x="486" y="82" width="78" height="30" rx="6" class="muted-stroke" stroke-width="1" fill="#ffffff"/>
    <text x="525" y="101" text-anchor="middle" class="chip">Cursor IDE</text>
  </g>
</svg>
