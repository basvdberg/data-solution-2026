# Airflow standalone for data-solution-2026 (BasNAS PoC).
# Usage: docker compose -f docker-compose.standalone.yaml up -d

services:
  airflow:
    image: apache/airflow:3.2.0
    container_name: airflow-standalone
    hostname: airflow-standalone
    # Airflow 3 Simple Auth Manager: fixed admin password from .env (not random per recreate)
    entrypoint: ["/bin/bash", "-ec"]
    command:
      - |
        mkdir -p /opt/airflow/config
        : "$${AIRFLOW_ADMIN_PASSWORD:?Set AIRFLOW_ADMIN_PASSWORD in .env}"
        python3 -c "import json, os; json.dump({'admin': os.environ['AIRFLOW_ADMIN_PASSWORD']}, open('/opt/airflow/config/simple_auth_manager_passwords.json', 'w'))"
        exec /entrypoint standalone
    # Match host volume owner (AIRFLOW_UID in .env, typically id -u on NAS/Linux)
    user: "${AIRFLOW_UID:-50000}:0"
    env_file:
      - .env
    ports:
      - "${AIRFLOW_HOST_PORT:-8081}:8080"
    volumes:
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
      - ${DATA_SOLUTION_ROOT:-../../}:/opt/data-solution:ro
      - ${DATA_SOLUTION_ROOT:-../../}/data:/opt/data-solution/data
      - ${DATA_SOLUTION_ROOT:-../../}/code/airflow/dags:/opt/airflow/dags:ro
    environment:
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_USERS: "admin:admin"
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_PASSWORDS_FILE: "/opt/airflow/config/simple_auth_manager_passwords.json"
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      # Docker/QNAP often yields empty getfqdn(); without a hostname the UI builds http://:8793/log/...
      AIRFLOW__CORE__HOSTNAME_CALLABLE: airflow.utils.net.get_host_ip_address
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
      PYTHONPATH: /opt/data-solution/code:/opt/data-solution
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres:5432}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      DATA_SOLUTION_DB: ${DATA_SOLUTION_DB:-${POSTGRES_DB:-data-solution-2026}}
      _PIP_ADDITIONAL_REQUIREMENTS: ${_PIP_ADDITIONAL_REQUIREMENTS:-requests>=2.32,<3 pandas>=2.2,<3 pyarrow>=16 jsonschema>=4 kafka-python psycopg[binary]}
    restart: unless-stopped
    networks:
      - default
      - postgres

networks:
  default:
    name: apache-airflow_default
  postgres:
    external: true
    name: data-solution-postgres_default
